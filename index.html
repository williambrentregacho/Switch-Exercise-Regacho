    let grade1 = prompt("#1a: Enter grade (A-F)");
    let message1;

    if (grade1) {
        switch (grade1.toUpperCase()) {
            case "A":
            case "B":
                message1 = "Excellent";
                break;
            case "C":
                message1 = "You passed";
                break;
            case "D":
                message1 = "Needs improvement";
                break;
            case "F":
                message1 = "Failed";
                break;
            default:
                message1 = "Please input a valid grade.";
        }
    } else {
        message1 = "No input provided.";
    }

        }
    } else {

    }

    document.getElementById("output").innerHTML = output;
